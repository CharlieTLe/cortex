# Minimal CubeFS values for Kind local development.
# Disables CSI, monitoring, client, and blobstore components.
# Removes node selectors so pods schedule on any Kind worker node.

component:
  master: true
  datanode: true
  metanode: true
  objectnode: true
  client: false
  csi: false
  monitor: false
  ingress: false
  blobstore_clustermgr: false
  blobstore_blobnode: false
  blobstore_proxy: false
  blobstore_scheduler: false
  blobstore_access: false

image:
  server: cubefs/cfs-server:v3.5.0
  pull_policy: "IfNotPresent"

path:
  data: /var/lib/cubefs
  log: /var/log/cubefs
  monitor: ""

master:
  replicas: 3
  cluster: cortex-dev
  nodeSelector:
  tolerations: []
  log_level: error
  retain_logs: 100
  port: 17010
  prof: 17020
  exporter_port: 9500
  metanode_reserved_mem: "33554432"
  legacy_data_media_type: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    enabled: false

metanode:
  nodeSelector:
  tolerations: []
  log_level: error
  total_mem: "1073741824"
  port: 17210
  prof: 17220
  raft_heartbeat: 17230
  raft_replica: 17240
  exporter_port: 9510
  resources:
    enabled: false
  config_override: |
    {
    }

datanode:
  nodeSelector:
  tolerations: []
  log_level: error
  port: 17310
  prof: 17320
  raft_heartbeat: 17330
  raft_replica: 17340
  exporter_port: 9520
  disks:
    - /data0:1073741824
  media_type: 1
  resources:
    enabled: false
  config_override: |
    {
    }

objectnode:
  replicas: 1
  nodeSelector:
  tolerations: []
  log_level: error
  port: 1601
  prof: 7011
  exporter_port: 9500
  region: "local"
  domains: ""
  host: objectnode.cubefs.local
  resources:
    enabled: false

consul:
  port: 8500
  replicas: 1
  external_address: "http://127.0.0.1:8500"
