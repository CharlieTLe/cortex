---
apiVersion: v1
kind: Namespace
metadata:
  name: minio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args: ["server", "/data"]
        env:
        - name: MINIO_ROOT_USER
          value: "minio"
        - name: MINIO_ROOT_PASSWORD
          value: "minio123"
        ports:
        - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: minio
spec:
  selector:
    app: minio
  ports:
  - port: 9000
    targetPort: 9000
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-init
  namespace: minio
spec:
  backoffLimit: 4
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-minio
        image: busybox:1.36
        command: ["sh", "-c", "until nc -z minio.minio.svc.cluster.local 9000; do echo waiting for minio; sleep 2; done"]
      containers:
      - name: create-bucket
        image: minio/mc:latest
        command:
        - /bin/sh
        - -c
        - |
          mc alias set local http://minio.minio.svc.cluster.local:9000 minio minio123
          mc mb --ignore-existing local/cortex-blocks
