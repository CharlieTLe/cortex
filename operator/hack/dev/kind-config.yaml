# Kind cluster configuration with multi-zone worker nodes.
# Each worker node is labeled with a different availability zone to simulate
# a multi-AZ deployment for testing zone-aware replication.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-a
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-b
  - role: worker
    labels:
      topology.kubernetes.io/zone: zone-c
