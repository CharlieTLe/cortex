---
apiVersion: v1
kind: Namespace
metadata:
  name: cortex-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex-operator
  namespace: cortex-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cortex-operator-manager-role
rules:
- apiGroups: [""]
  resources: [configmaps, services]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: [""]
  resources: [pods, secrets]
  verbs: [get, list, watch]
- apiGroups: [apps]
  resources: [deployments, statefulsets]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [cortex.cortex.io]
  resources: [cortexes]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [cortex.cortex.io]
  resources: [cortexes/finalizers]
  verbs: [update]
- apiGroups: [cortex.cortex.io]
  resources: [cortexes/status]
  verbs: [get, patch, update]
- apiGroups: [policy]
  resources: [poddisruptionbudgets]
  verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cortex-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cortex-operator-manager-role
subjects:
- kind: ServiceAccount
  name: cortex-operator
  namespace: cortex-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-operator
  namespace: cortex-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cortex-operator
  template:
    metadata:
      labels:
        app: cortex-operator
    spec:
      serviceAccountName: cortex-operator
      containers:
      - name: manager
        image: cortex-operator:dev
        imagePullPolicy: Never
        args:
        - --leader-elect=false
        - --health-probe-bind-address=:8081
        - --metrics-bind-address=0
        env:
        - name: ENABLE_WEBHOOKS
          value: "false"
        ports:
        - containerPort: 8081
          name: health
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
